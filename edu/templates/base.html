<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EDU{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }

        header, main, footer {
            max-width: 960px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: #1d4ed8;
            color: white;
            border-radius: 0 0 16px 16px;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }

        nav a, .button-link {
            color: white;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.16);
            padding: 10px 14px;
            border-radius: 10px;
        }

        main {
            display: grid;
            gap: 20px;
        }

        section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        }

        ul {
            padding-left: 20px;
        }

        form {
            display: grid;
            gap: 12px;
        }

        button {
            width: fit-content;
            border: 0;
            background: #1d4ed8;
            color: white;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <h1>Sistema EDU</h1>
        <nav>
            <a href="{% url 'edu:home' %}">Início</a>
            <a href="{% url 'edu:list_autores' %}">Autores</a>
            <a href="{% url 'edu:list_editoras' %}">Editoras</a>
            <a href="{% url 'edu:list_livros' %}">Livros</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>IFPB 2026</p>
    </footer>
</body>
</html>
