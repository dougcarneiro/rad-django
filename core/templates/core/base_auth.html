<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EDU{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 36px 40px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.10);
            width: 100%;
            max-width: 420px;
        }

        h1 {
            margin: 0 0 8px;
            color: #1d4ed8;
            font-size: 1.6rem;
        }

        .subtitle {
            color: #6b7280;
            margin: 0 0 24px;
            font-size: 0.9rem;
        }

        form {
            display: grid;
            gap: 14px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 4px;
            color: #374151;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus {
            border-color: #1d4ed8;
            box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.12);
        }

        .errorlist {
            list-style: none;
            padding: 0;
            margin: 4px 0 0;
            color: #dc2626;
            font-size: 0.82rem;
        }

        button[type="submit"] {
            width: 100%;
            border: 0;
            background: #1d4ed8;
            color: white;
            padding: 11px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 4px;
        }

        button[type="submit"]:hover {
            background: #1e40af;
        }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.88rem;
            color: #6b7280;
        }

        .footer-link a {
            color: #1d4ed8;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
